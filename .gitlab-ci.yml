workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

stages:
  - lint
  - test
  - security

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

default:
  interruptible: true
  before_script:
    - pip install uv
    - uv sync --group dev
  cache:
    key: "${CI_JOB_IMAGE}"
    paths:
      - .uv-cache/
      - .pip-cache/

lint-typecheck:
  stage: lint
  image: python:3.11-slim-bookworm
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libatomic1
    - pip install uv
    - uv sync --group dev
  script:
    - uv run ruff check src tests
    - uv run ruff format --check src tests
    - find src/ scripts/ -name '*.py' -exec python scripts/check_copyright_header.py {} +
    - uv run pyright src

.test-base:
  stage: test
  script:
    - uv run coverage run -m pytest tests/ -v
    - uv run coverage report

test-py3.10:
  extends: .test-base
  image: python:3.10-slim-bookworm

test-py3.11:
  extends: .test-base
  image: python:3.11-slim-bookworm

test-py3.12:
  extends: .test-base
  image: python:3.12-slim-bookworm

test-py3.13:
  extends: .test-base
  image: python:3.13-slim-bookworm

security-audit:
  stage: security
  image: python:3.11-slim-bookworm
  script:
    - uv run pip-audit

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
